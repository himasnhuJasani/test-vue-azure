trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  registryServer: 'vueapp.azurecr.io'
  imageName: 'my-vue-app'
  containerAppName: 'my-vue-live-app'
  resourceGroup: 'vue-project-rg'

steps:

- task: Docker@2
  displayName: Build and Push to ACR
  inputs:
    containerRegistry: 'Azure-Docker-Connection'
    repository: '$(imageName)'
    command: buildAndPush
    Dockerfile: '**/Dockerfile'
    tags: |
      latest

- task: AzureCLI@2
  displayName: Deploy to Azure Container App
  inputs:
    azureSubscription: 'Azure-Cloud-Connection'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      az extension add --name containerapp --upgrade --yes
      az containerapp update \
        --name $(containerAppName) \
        --resource-group $(resourceGroup) \
        --image $(registryServer)/$(imageName):latest