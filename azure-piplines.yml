trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  registryName: 'vueapp.azurecr.io'
  imageName: 'my-vue-app'
  containerAppName: 'my-vue-live-app'
  resourceGroup: 'vue-project-rg'

steps:
# 1. Build and push the Docker Image to Azure Registry
- task: Docker@2
  displayName: 'Build and Push to ACR'
  inputs:
    containerRegistry: 'Azure-Docker-Connection'
    repository: '$(imageName)'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: 'latest'

# 2. Add the extension installer, then update the app specifying the location
- task: AzureCLI@2
  displayName: 'Deploy to Azure Container Apps'
  inputs:
    azureSubscription: 'Azure-Cloud-Connection'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      # 1. Install the containerapp extension
      az extension add --name containerapp --upgrade --yes
      
      # 2. Update the container app specifying the exact resource location (eastus)
      az containerapp update \
        --name $(containerAppName) \
        --resource-group $(resourceGroup) \
        --location "eastus" \
        --image $(registryServer)/$(imageName):latest

